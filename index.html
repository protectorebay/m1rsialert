<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTC 1M RSI Meter</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#container {
    width: 600px;
    text-align: center;
}

#value {
    font-size: 70px;
    font-weight: bold;
    margin-bottom: 10px;
}

#alert-container {
    font-size: 36px;
    font-weight: bold;
    height: 50px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

#alert-dot {
    color: orange;
    font-size: 30px;
}

#alert-text {
    min-width: 250px;
}

.blink-red {
    color: #e53935;
    animation: blink 0.7s infinite;
}

.blink-green {
    color: #00c853;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

#meter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

.label {
    font-weight: bold;
    width: 140px;
}

#oversold {
    color: #00c853;
    text-align: right;
}

#overbought {
    color: #e53935;
    text-align: left;
}

#meter {
    position: relative;
    width: 400px;
    height: 20px;
    background: linear-gradient(to right, 
        #00c853 0%, 
        #00c853 30%, 
        #fbc02d 50%, 
        #e53935 70%, 
        #e53935 100%);
    border-radius: 10px;
}

#needle {
    position: absolute;
    top: 0;
    width: 20px;
    height: 20px;
    background: rgba(0,0,0,0.8);
    border-radius: 5px;
    transition: left 0.4s ease;
    animation: pulse 0.6s infinite alternate;
}

@keyframes pulse {
    from { transform: scaleX(1); opacity: 0.7; }
    to { transform: scaleX(1.15); opacity: 1; }
}
</style>
</head>
<body>

<div id="container">

    <div id="value">--</div>
    
    <div id="alert-container">
        <span id="alert-dot">●</span>
        <span id="alert-text"></span>
    </div>

    <div id="meter-row">
        <div id="oversold" class="label">OVERSOLD</div>

        <div id="meter">
            <div id="needle"></div>
        </div>

        <div id="overbought" class="label">OVERBOUGHT</div>
    </div>

</div>

<script>
async function loadRSI() {
    try {
        const response = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=200");
        const data = await response.json();

        const closes = data.map(c => parseFloat(c[4]));
        const rsi = calculateRSI(closes, 14);
        const last = rsi[rsi.length - 1];

        updateUI(last);

    } catch (e) {
        document.getElementById("value").innerText = "Error";
    }
}

function calculateRSI(prices, period) {
    let gains = 0;
    let losses = 0;

    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i - 1];
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    gains /= period;
    losses /= period;

    let rs = gains / losses;
    let rsi = [100 - (100 / (1 + rs))];

    for (let i = period + 1; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        let gain = diff > 0 ? diff : 0;
        let loss = diff < 0 ? -diff : 0;

        gains = (gains * (period - 1) + gain) / period;
        losses = (losses * (period - 1) + loss) / period;

        rs = gains / losses;
        rsi.push(100 - (100 / (1 + rs)));
    }

    return rsi;
}

function updateUI(value) {
    const meter = document.getElementById("meter");
    const needle = document.getElementById("needle");
    const valueEl = document.getElementById("value");
    const alertTextEl = document.getElementById("alert-text");

    valueEl.innerText = value.toFixed(2);

    const width = meter.offsetWidth;
    const position = (value / 100) * width;

    needle.style.left = (position - 10) + "px";

    // reset alert text
    alertTextEl.className = '';
    alertTextEl.innerText = '';

    if (value >= 75) {
        valueEl.style.color = "#e53935";
        alertTextEl.innerText = '⚠️ OVERBOUGHT ALERT';
        alertTextEl.classList.add("blink-red");
    } else if (value <= 25) {
        valueEl.style.color = "#00c853";
        alertTextEl.innerText = '⚠️ OVERSOLD ALERT';
        alertTextEl.classList.add("blink-green");
    } else {
        valueEl.style.color = "black";
    }
}

loadRSI();
setInterval(loadRSI, 8000);
</script>

</body>
</html>
